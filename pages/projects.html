<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Projects | wbee.me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Link your CSS -->
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/theme.css">
</head>

<body>
  <header>
    <h1>Projects</h1>
    <!-- Basic nav if you want, or link back to home, about, etc. -->
    <nav>
      <a href="../index.html">Home</a> |
      <a href="./about.html">About</a> |
      <a href="./contact.html">Contact</a>
    </nav>
  </header>

  <!-- ADDED: Provide a parent container around the dynamic items. -->
  <main class="container">
    <div id="projects-container">
      <!-- Projects inserted here via JS -->
    </div>
  </main>

  <footer>
    <p>© 2025 W. Beeson</p>
  </footer>

  <!-- Load your helpers + main scripts last -->
  <script src="../scripts/helpers.js"></script>
  <script>
    const container = document.getElementById("projects-container");
    const allProjects = getAllProjects();  // from helpers.js

    allProjects.forEach((project) => {
      const projectDiv = document.createElement("div");
      projectDiv.classList.add("project-item");
      // ADDED: a sub-container for text to keep consistent layout
      const textBlock = document.createElement("div");
      textBlock.classList.add("project-text");

      const titleEl = document.createElement("h2");
      titleEl.textContent = project.title;

      // description can contain HTML, so use innerHTML carefully
      const descEl = document.createElement("div");
      descEl.innerHTML = project.description;

      // code snippet list
      const codeList = document.createElement("ul");
      project.codeSnippets.forEach(snippet => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = snippet.snippetUrl;
        a.textContent = snippet.fileName;
        li.appendChild(a);
        codeList.appendChild(li);
      });

      // Append title and description first
      textBlock.appendChild(titleEl);
      textBlock.appendChild(descEl);

      // If there are code snippets, add heading
      if (project.codeSnippets.length > 0) {
        const codeHeader = document.createElement("h4");
        codeHeader.textContent = "Code Snippets:";
        textBlock.appendChild(codeHeader);
        textBlock.appendChild(codeList);
      }


      projectDiv.appendChild(textBlock);
      container.appendChild(projectDiv);
    });
  </script>
</body>

</html>
